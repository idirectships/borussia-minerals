name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: '{"type":"service_account"}'
          GOOGLE_SHEET_ID: "fake-sheet-id"
          REVALIDATE_SECRET: "fake-secret"
